<!DOCTYPE html>
<html>
    <head>
        <title>form</title>
    </head>
    <body>
        <p> โปรดระบุตามความเป็นจริง</p>
        <form action="/result" method="POST" enctype="multipart/form-data" >
            {% if sex == "1"%}
                <label><b>สภาพผิวหน้าของคุณช่วงนี้หรืออาการหลังโกนหนวดเป็นอย่างไรบ้าง</b></label>
                <br>
                <input type="radio" id="opt01" name="choice0" value="15">
                <label for="opt01">หน้ามันและมีสิวเม็ดใหญ่ ขึ้นหลังโกนหนวด</label>
                <br>
                <input type="radio" id="opt02" name="choice0" value="10">
                <label for="opt02">หน้ามันและมีสิวเม็ดใหญ่ขึ้นบ่อยๆ ไม่เกี่ยวกับการโกน</label>
                <br>
                <input type="radio" id="opt03" name="choice0" value="5">
                <label for="opt03">หน้ามันปกติ แต่ชอบมีผื่นแดงหรือสิวเม็ดเล็ก</label>
                <br>
                <input type="radio" id="opt04" name="choice0" value="0">
                <label for="opt04">หน้ามันปกติ ไม่มีสิว </label>
            {% elif sex == "2"%}
                <label><b>สภาพผิวหน้าของคุณช่วงนี้หรืออาการหลังโกนหนวดเป็นอย่างไรบ้าง</b></label>
                <br>
                <input type="radio" id="opt31" name="choice3" value="12">
                <label for="opt31">กำลังมีประจำเดือน</label>
                <br>
                <input type="radio" id="opt32" name="choice3" value="15">
                <label for="opt32">อีกประมาณ1สัปดาห์</label>
                <br>
                <input type="radio" id="opt33" name="choice3" value="3">
                <label for="opt33">เพิ่งหมดไป</label>
                <br>
                <input type="radio" id="opt44" name="choice3" value="0">
                <label for="opt34">ไม่อยู่ในกลุ่มนี้</label>
            {% endif %}
            <label><b>คุณเปลี่ยนปลอกหมอน/ผ้าขนหนูบ่อยแค่ไหน</b></label>
            <br>
            <input type="radio" id="opt41" name="choice4" value="0">
            <label for="opt41">ทุก2-3วัน </label>
            <br>
            <input type="radio" id="opt42" name="choice4" value="3.75">
            <label for="opt42">อาทิตย์ละครั้ง</label>
            <br>
            <input type="radio" id="opt43" name="choice4" value="11.25">
            <label for="opt43">สองอาทิตย์ครั้ง</label>
            <br>
            <input type="radio" id="opt44" name="choice4" value="15">
            <label for="opt44">นานกว่านี้ </label>
            <br>
            <br>
            <label><b>การแต่งหน้าและการล้างหน้า</b></label>
            <br>
            <input type="radio" id="opt51" name="choice5" value="3">
            <label for="opt51">ใช้คุชชั่น/รองพื้น ล้างด้วยคลีนซิ่ง+โฟม</label>
            <br>
            <input type="radio" id="opt52" name="choice5" value="15">
            <label for="opt52">ใช้คุชชั่น/รองพื้น ล้างด้วยโฟม</label>
            <br>
            <input type="radio" id="opt53" name="choice5" value="0">
            <label for="opt53">ไม่ทา ล้างด้วยโฟม</label>
            <br>
            <input type="radio" id="opt54" name="choice5" value="6">
            <label for="opt54">ไม่ทา ล้างน้ำเปล่า </label>
            <br>
            <br>
            <label><b>เวลาเข้านอน</b></label>
            <br>
            <input type="radio" id="opt61" name="choice6" value="0">
            <label for="opt61">ก่อน22:00</label>
            <br>
            <input type="radio" id="opt62" name="choice6" value="3.75">
            <label for="opt62">ห22:00-00:00</label>
            <br>
            <input type="radio" id="opt63" name="choice6" value="15">
            <label for="opt63">หหลัง00:00</label>
            <br>
            <br>
            <label><b>พฤติกรรมการบีบ/แกะ </b></label>
            <br>
            <input type="radio" id="opt71" name="choice7" value="15">
            <label for="opt71">รู้สึกเจ็บ ระบบ ปวดตื้อๆ </label>
            <br>
            <input type="radio" id="opt72" name="choice7" value="15">
            <label for="opt72">รู้สึกคันยิบๆ ยิ่งเวลาอากาศร้อนหรือเหงื่อออกยิ่งอยากเกา</label>
            <br>
            <input type="radio" id="opt73" name="choice7" value="10">
            <label for="opt73">ไม่เจ็บไม่คัน แต่ชอบเอามือไปจับ หร่อบีบสิวบ่อยๆ</label>
            <br>
            <input type="radio" id="opt74" name="choice7" value="0">
            <label for="opt74">ไม่เจ็บไม่คัน พยายามไม่เอามือไปสัมผัสใบหน้า</label>
            <br>
            <br>
            <label><b>ช่วงนี้คุณทานของหวาน เบเกอรี่ นมวัว หรือชานม บ่อยแค่ไหน</b></label>
            <br>
            <input type="radio" id="opt81" name="choice8" value="15">
            <label for="opt81">ทานแทบทุกวัน</label>
            <br>
            <input type="radio" id="opt82" name="choice8" value="5">
            <label for="opt82">สัปดาห์ละ 2-3 ครั้ง</label>
            <br>
            <input type="radio" id="opt83" name="choice8" value="0">
            <label for="opt83">ทานน้อยมาก</label>
            <br>
            <br>
            <label><b>ช่วงนี้พฤติกรรมการทานอาหารทอด อาหารมันหรืออาหารรสจัด/ชาบู เป็นอย่างไร</b></label>
            <br>
            <input type="radio" id="opt91" name="choice9" value="15">
            <label for="opt91">ทานเป็นประจำ </label>
            <br>
            <input type="radio" id="opt92" name="choice9" value="5">
            <label for="opt92">มีของทอดบ้างบางมื้อ</label>
            <br>
            <input type="radio" id="opt93" name="choice9" value="0">
            <label for="opt93">เน้นทานอาหารคลีน </label>
            <button type="submit">ดูผลลัพธ์</button>
        </form>
        <br>
        <a href="/" >
            <button type="button">กลับหน้าหลัก</button>
        </a>


    </body>
</html>
